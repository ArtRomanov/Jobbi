services:
  backend:
    build:
      context: ./backend
      target: production
    ports:
      - "8003:8003"
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
      - backend-data:/app/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8003 --reload
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/api/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      target: builder
    ports:
      - "5174:5174"
    volumes:
      - ./frontend:/build
      - frontend-node-modules:/build/node_modules
    command: pnpm dev --host 0.0.0.0 --port 5174
    environment:
      - VITE_API_URL=http://localhost:8003
    depends_on:
      backend:
        condition: service_healthy

  bot:
    build:
      context: ./backend
      target: production
    volumes:
      - ./backend/app:/app/app
      - backend-data:/app/data
    command: python -m app.bot
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend-data:
  frontend-node-modules:
